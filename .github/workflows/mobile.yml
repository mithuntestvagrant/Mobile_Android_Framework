name: Appium WebdriverIO API Demo Tests

on:
  push:
    branches:
      - master

jobs:
  android-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Emulator and Run Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel
          script: |
            appium &
            sleep 15
            npx wdio run wdio.conf.js --spec ./test/specs/apiDemoApp.js